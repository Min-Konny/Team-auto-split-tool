<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Team Maker — LoL</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-0: oklch(0.16 0.02 250);
  --bg-1: oklch(0.20 0.022 250);
  --bg-2: oklch(0.24 0.024 250);
  --line: oklch(0.30 0.02 250);
  --line-2: oklch(0.40 0.025 250);
  --fg-0: oklch(0.96 0.01 250);
  --fg-1: oklch(0.78 0.015 250);
  --fg-2: oklch(0.58 0.018 250);
  --fg-3: oklch(0.42 0.02 250);
  --blue: oklch(0.72 0.16 240);
  --blue-d: oklch(0.42 0.14 240);
  --blue-bg: oklch(0.22 0.07 240);
  --red: oklch(0.68 0.20 25);
  --red-d: oklch(0.42 0.17 25);
  --red-bg: oklch(0.22 0.10 25);
  --gold: oklch(0.82 0.13 85);
  --warn: oklch(0.78 0.15 65);
  --ok: oklch(0.76 0.16 145);
  --r-top: oklch(0.72 0.18 25);
  --r-jng: oklch(0.76 0.16 145);
  --r-mid: oklch(0.72 0.16 240);
  --r-adc: oklch(0.72 0.18 305);
  --r-sup: oklch(0.80 0.15 70);
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--bg-0); color: var(--fg-0);
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── Topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(18px);
  background: color-mix(in oklch, var(--bg-0) 85%, transparent);
  border-bottom: 1px solid var(--line);
}
.topbar-inner {
  max-width: 1440px; margin: 0 auto; padding: 12px 28px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; font-family: 'Space Grotesk'; font-weight: 600; font-size: 15px; text-decoration: none; color: inherit; }
.brand-mark { width: 26px; height: 26px; position: relative; }
.brand-mark::before, .brand-mark::after { content: ""; position: absolute; inset: 0; border-radius: 3px; }
.brand-mark::before { background: linear-gradient(135deg, var(--blue), var(--blue-d)); clip-path: polygon(0 0,100% 0,100% 100%,50% 100%,0 50%); }
.brand-mark::after  { background: linear-gradient(135deg, var(--red-d), var(--red)); clip-path: polygon(50% 100%,100% 100%,100% 50%); }
.brand-sub { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--fg-3); letter-spacing: 0.12em; text-transform: uppercase; margin-left: 4px; }
.nav { display: flex; gap: 2px; }
.nav a { padding: 7px 14px; border-radius: 999px; color: var(--fg-1); font-size: 13px; text-decoration: none; transition: background 0.15s, color 0.15s; }
.nav a:hover { background: var(--bg-2); color: var(--fg-0); }
.nav a.active { background: var(--bg-2); color: var(--fg-0); }

/* ── Layout ── */
.page-layout {
  max-width: 1440px; margin: 0 auto;
  display: grid; grid-template-columns: 400px 1fr;
  height: calc(100vh - 57px - 68px); overflow: hidden;
}
.panel { border-right: 1px solid var(--line); display: flex; flex-direction: column; overflow: hidden; }
.panel-hd {
  padding: 16px 20px 12px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.panel-hd h2 { font-family: 'Space Grotesk'; font-size: 15px; font-weight: 600; margin: 0; }
.panel-hd .count { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--fg-3); }
.panel-body { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: thin; scrollbar-color: var(--line-2) transparent; }
.panel-body::-webkit-scrollbar { width: 5px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }

/* ── Search & tags ── */
.search-area { padding: 10px; border-bottom: 1px solid var(--line); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
.search-row { position: relative; }
.search-row input {
  width: 100%; padding: 9px 12px 9px 36px;
  background: var(--bg-1); border: 1px solid var(--line);
  border-radius: 9px; color: var(--fg-0); font-family: inherit; font-size: 13.5px;
  outline: none; transition: border-color 0.15s;
}
.search-row input::placeholder { color: var(--fg-3); }
.search-row input:focus { border-color: var(--line-2); background: var(--bg-2); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--fg-3); pointer-events: none; }
.tag-row { display: flex; gap: 5px; flex-wrap: wrap; }
.tag-chip {
  font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: 0.08em;
  padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line);
  background: transparent; color: var(--fg-2); cursor: pointer; transition: all 0.12s;
}
.tag-chip:hover { border-color: var(--line-2); color: var(--fg-1); }
.tag-chip.active { background: color-mix(in oklch, var(--blue) 18%, transparent); border-color: var(--blue-d); color: var(--blue); }

/* ── Pool card ── */
.pool-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px; border: 1px solid transparent;
  margin-bottom: 5px; cursor: pointer;
  background: var(--bg-1); transition: background 0.12s, border-color 0.12s, transform 0.12s;
}
.pool-card:hover:not(.pool-selected) { background: var(--bg-2); border-color: var(--line); transform: translateX(2px); }
.pool-card.pool-selected { opacity: 0.38; cursor: not-allowed; }
.pool-card.just-added { animation: addedFlash 0.4s ease; }
@keyframes addedFlash {
  0%   { background: color-mix(in oklch, var(--blue) 25%, var(--bg-1)); border-color: var(--blue); }
  100% { background: var(--bg-1); border-color: transparent; }
}
.pool-card .card-info { flex: 1; min-width: 0; }
.pool-card .name { font-weight: 600; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pool-card .sub-name { font-size: 11px; color: var(--fg-3); font-family: 'JetBrains Mono'; margin-top: 1px; }
.pool-card .rates { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--fg-2); margin-top: 4px; display: flex; gap: 8px; align-items: center; }
.pool-card .add-icon { color: var(--fg-3); flex-shrink: 0; transition: color 0.12s; }
.pool-card:hover:not(.pool-selected) .add-icon { color: var(--blue); }

/* ── Role badge (FIXED uniform width) ── */
.role-badge {
  font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 600;
  padding: 3px 0; border-radius: 5px; letter-spacing: 0.05em;
  width: 58px; text-align: center; display: inline-block; flex-shrink: 0;
  background: var(--bg-2);
}
.role-badge.TOP    { color: var(--r-top); border: 1px solid color-mix(in oklch, var(--r-top) 35%, transparent); }
.role-badge.JUNGLE { color: var(--r-jng); border: 1px solid color-mix(in oklch, var(--r-jng) 35%, transparent); }
.role-badge.MID    { color: var(--r-mid); border: 1px solid color-mix(in oklch, var(--r-mid) 35%, transparent); }
.role-badge.ADC    { color: var(--r-adc); border: 1px solid color-mix(in oklch, var(--r-adc) 35%, transparent); }
.role-badge.SUP    { color: var(--r-sup); border: 1px solid color-mix(in oklch, var(--r-sup) 35%, transparent); }

/* ── Roster slot — compact horizontal ── */
.roster-slot {
  background: var(--bg-1); border: 1px solid var(--line); border-radius: 8px;
  margin-bottom: 4px; transition: border-color 0.15s;
  animation: slotIn 0.18s ease;
}
@keyframes slotIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
.roster-slot:hover { border-color: var(--line-2); }
/* roster row — bigger */
.rs-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; }
.roster-num { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--fg-3); width: 18px; flex-shrink: 0; }
.rs-name-block { flex: 1; min-width: 0; }
.rs-pname { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rs-sname { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--fg-3); white-space: nowrap; }
.rs-rates { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--fg-2); display: flex; gap: 10px; flex-shrink: 0; }
.rs-ng-row { display: flex; gap: 3px; flex-shrink: 0; }
.remove-btn {
  width: 24px; height: 24px; border-radius: 5px; background: transparent;
  border: 1px solid var(--line); color: var(--fg-3); cursor: pointer;
  display: grid; place-items: center; flex-shrink: 0; transition: all 0.12s;
}
.remove-btn:hover { background: color-mix(in oklch, var(--red) 15%, transparent); border-color: var(--red-d); color: var(--red); }
.uw-btn {
  font-family: 'JetBrains Mono'; font-size: 9.5px; padding: 3px 0; border-radius: 4px;
  border: 1px solid var(--line); background: transparent; color: var(--fg-3);
  cursor: pointer; transition: all 0.12s; letter-spacing: 0.03em;
  width: 46px; text-align: center;
}
.uw-btn:hover { border-color: var(--line-2); color: var(--fg-1); }
.uw-btn.uw-on { background: color-mix(in oklch, var(--red) 14%, transparent); border-color: var(--red-d); color: var(--red); }
.empty-slot {
  padding: 9px 12px; text-align: center; font-family: 'JetBrains Mono'; font-size: 10.5px;
  color: var(--fg-3); letter-spacing: 0.05em; border: 1px dashed var(--line);
  border-radius: 8px; margin-bottom: 4px;
}

/* ── Footer ── */
.action-footer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  background: color-mix(in oklch, var(--bg-0) 94%, transparent);
  backdrop-filter: blur(16px); border-top: 1px solid var(--line);
}
.footer-inner {
  max-width: 1440px; margin: 0 auto; padding: 0 28px;
  display: flex; align-items: center; gap: 16px; height: 68px;
}
.progress-wrap { display: flex; align-items: center; gap: 10px; }
.prog-dots { display: flex; gap: 4px; }
.prog-dot { width: 9px; height: 9px; border-radius: 2px; background: var(--line-2); transition: background 0.2s; }
.prog-dot.blue { background: var(--blue); }
.prog-dot.red  { background: var(--red); }
.prog-text { font-family: 'JetBrains Mono'; font-size: 12px; }
.prog-text .prog-n { color: var(--fg-0); font-weight: 600; }
.prog-text .prog-remain { color: var(--fg-2); margin-left: 6px; }
.mode-toggle { display: flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
.mode-btn { padding: 7px 14px; font-size: 12px; background: transparent; border: 0; color: var(--fg-2); cursor: pointer; transition: all 0.12s; white-space: nowrap; font-family: inherit; }
.mode-btn.active { background: var(--bg-2); color: var(--fg-0); }
.tol-wrap { display: flex; align-items: center; gap: 7px; }
.tol-lbl { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
.tol-input {
  width: 64px; padding: 6px 8px; border-radius: 7px;
  background: var(--bg-1); border: 1px solid var(--line);
  color: var(--fg-0); font-family: 'JetBrains Mono'; font-size: 13px;
  text-align: center; outline: none; transition: border-color 0.15s;
}
.tol-input:focus { border-color: var(--line-2); }
.spacer { flex: 1; }
.btn-ghost {
  padding: 10px 20px; border-radius: 9px; background: transparent;
  border: 1px solid var(--line-2); color: var(--fg-1);
  font-family: 'Space Grotesk'; font-weight: 600; font-size: 13.5px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-ghost:hover { background: var(--bg-2); color: var(--fg-0); }
.btn-primary {
  padding: 11px 28px; border-radius: 9px; border: 0;
  background: var(--fg-0); color: var(--bg-0);
  font-family: 'Space Grotesk'; font-weight: 700; font-size: 14px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  display: flex; align-items: center; gap: 8px;
}
.btn-primary:hover:not(:disabled) { background: var(--gold); }
.btn-primary:disabled { opacity: 0.28; cursor: not-allowed; }

/* ── Team Overlay ── */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg-0);
  display: flex; flex-direction: column;
  animation: fadeUp 0.22s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.ov-hd {
  display: flex; align-items: center; padding: 14px 28px;
  border-bottom: 1px solid var(--line); flex-shrink: 0; gap: 14px;
}
.ov-hd h2 { font-family: 'Space Grotesk'; font-size: 17px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
.ov-hd .ov-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--line);
  background: transparent; color: var(--fg-2); cursor: pointer; display: grid; place-items: center; transition: all 0.12s;
}
.icon-btn:hover { background: var(--bg-2); color: var(--fg-0); }
.regen-btn {
  display: flex; align-items: center; gap: 7px; padding: 8px 15px;
  border-radius: 8px; border: 1px solid var(--line); background: transparent;
  color: var(--fg-1); font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.15s;
}
.regen-btn:hover { background: var(--bg-2); color: var(--fg-0); border-color: var(--line-2); }

/* Team stats bar */
.ov-stats {
  display: grid; grid-template-columns: 1fr auto 1fr;
  border-bottom: 1px solid var(--line); flex-shrink: 0;
}
.ov-stat-side { padding: 16px 28px; display: flex; gap: 24px; align-items: center; }
.ov-stat-side.right { justify-content: flex-end; }
.stat-block { display: flex; flex-direction: column; }
.stat-block .sv { font-family: 'Space Grotesk'; font-size: 28px; font-weight: 600; letter-spacing: -0.03em; }
.stat-block .sk { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.14em; margin-top: 2px; }
.ov-stat-mid { display: flex; align-items: center; justify-content: center; padding: 0 20px; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
.total-diff { font-family: 'JetBrains Mono'; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.total-diff .td-n { font-size: 20px; font-weight: 600; }
.total-diff .td-n.ok   { color: var(--ok); }
.total-diff .td-n.warn { color: var(--warn); }
.total-diff .td-k { font-size: 10px; color: var(--fg-3); letter-spacing: 0.1em; text-transform: uppercase; }

/* Role comparison rows */
.ov-body { flex: 1; overflow-y: auto; padding: 12px 28px; display: flex; flex-direction: column; gap: 0; scrollbar-width: thin; scrollbar-color: var(--line-2) transparent; }
.ov-body::-webkit-scrollbar { width: 5px; }
.ov-body::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }

.swap-banner {
  background: color-mix(in oklch, var(--gold) 10%, var(--bg-1));
  border: 1px solid color-mix(in oklch, var(--gold) 40%, transparent);
  border-radius: 10px; padding: 10px 16px; margin-bottom: 8px; flex-shrink: 0;
  font-family: 'JetBrains Mono'; font-size: 12px; color: var(--gold);
  display: flex; align-items: center; gap: 10px; letter-spacing: 0.06em;
}
.swap-cancel {
  margin-left: auto; background: transparent; border: 1px solid color-mix(in oklch, var(--gold) 40%, transparent);
  color: var(--gold); border-radius: 5px; padding: 3px 10px; font-family: 'JetBrains Mono';
  font-size: 10px; cursor: pointer; transition: all 0.12s;
}
.swap-cancel:hover { background: color-mix(in oklch, var(--gold) 15%, transparent); }

.role-row {
  display: grid; grid-template-columns: 1fr 84px 1fr;
  gap: 8px; align-items: stretch; flex: 1; min-height: 0;
}

/* Player card in role row — compact 2-line layout */
.rr-card {
  background: var(--bg-1); border: 1px solid var(--line);
  border-radius: 10px; padding: 14px 20px;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 14px;
  height: 100%;
}
.rr-card:hover { border-color: var(--line-2); background: var(--bg-2); }
.rr-card.is-source { border-color: var(--gold); background: color-mix(in oklch, var(--gold) 8%, var(--bg-1)); box-shadow: 0 0 0 1px var(--gold); }
.rr-card.is-target { border-color: var(--line-2); border-style: dashed; }
.rr-card.is-target:hover { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
.rr-card.blue-card { border-left: 3px solid var(--blue-d); }
.rr-card.red-card  { border-right: 3px solid var(--red-d); flex-direction: row-reverse; }
.rr-info { flex: 1; min-width: 0; }
.rr-line1 { display: flex; align-items: baseline; gap: 6px; }
.rr-name  { font-weight: 600; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rr-sub   { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--fg-3); white-space: nowrap; }
.rr-line2 { display: flex; align-items: baseline; gap: 8px; margin-top: 6px; }
.rr-rate  { font-family: 'JetBrains Mono'; font-size: 22px; font-weight: 600; }
.rr-swap-icon { color: var(--fg-3); flex-shrink: 0; transition: color 0.12s; }
.rr-card.is-source .rr-swap-icon, .rr-card:hover .rr-swap-icon { color: var(--gold); }
/* red-card text alignment */
.rr-card.red-card .rr-line1 { flex-direction: row-reverse; }
.rr-card.red-card .rr-line2 { flex-direction: row-reverse; }

/* Role center column */
.rr-center {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  height: 100%;
}
.rr-role-btn {
  font-family: 'JetBrains Mono'; font-size: 11px; font-weight: 600;
  padding: 6px 10px; border-radius: 8px; letter-spacing: 0.06em;
  width: 84px; text-align: center; cursor: default;
  background: var(--bg-2); border: 1px solid var(--line);
}
.rr-role-btn.TOP    { color: var(--r-top); border-color: color-mix(in oklch, var(--r-top) 35%, transparent); }
.rr-role-btn.JUNGLE { color: var(--r-jng); border-color: color-mix(in oklch, var(--r-jng) 35%, transparent); }
.rr-role-btn.MID    { color: var(--r-mid); border-color: color-mix(in oklch, var(--r-mid) 35%, transparent); }
.rr-role-btn.ADC    { color: var(--r-adc); border-color: color-mix(in oklch, var(--r-adc) 35%, transparent); }
.rr-role-btn.SUP    { color: var(--r-sup); border-color: color-mix(in oklch, var(--r-sup) 35%, transparent); }
.rr-diff {
  font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 600;
  padding: 3px 8px; border-radius: 5px; letter-spacing: 0.04em;
}
.rr-diff.ok   { background: color-mix(in oklch, var(--ok)   15%, transparent); color: var(--ok); }
.rr-diff.warn { background: color-mix(in oklch, var(--warn) 15%, transparent); color: var(--warn); }

/* ── Result bar ── */
.result-bar {
  border-top: 1px solid var(--line); padding: 14px 28px;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.res-lbl { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 4px; white-space: nowrap; }
.win-btn {
  flex: 1; padding: 14px; border-radius: 11px; border: 1px solid var(--line);
  background: transparent; font-family: 'Space Grotesk'; font-weight: 700; font-size: 16px;
  letter-spacing: -0.01em; cursor: pointer; transition: all 0.18s;
}
.win-btn.blue { color: var(--blue); }
.win-btn.blue:hover { background: color-mix(in oklch, var(--blue) 16%, transparent); border-color: var(--blue-d); }
.win-btn.red  { color: var(--red); }
.win-btn.red:hover  { background: color-mix(in oklch, var(--red)  16%, transparent); border-color: var(--red-d); }
.win-btn.won-blue { background: color-mix(in oklch, var(--blue) 22%, transparent); border-color: var(--blue); }
.win-btn.won-red  { background: color-mix(in oklch, var(--red)  22%, transparent); border-color: var(--red); }
.draft-btn {
  display: flex; align-items: center; gap: 9px;
  padding: 14px 22px; border-radius: 11px; border: 1px solid var(--line-2);
  background: transparent; color: var(--fg-1);
  font-family: 'Space Grotesk'; font-weight: 600; font-size: 15px;
  cursor: pointer; text-decoration: none; transition: all 0.15s; white-space: nowrap;
}
.draft-btn:hover { background: var(--bg-2); color: var(--fg-0); border-color: var(--line-2); }
.draft-btn svg { flex-shrink: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;

// ── Data ──────────────────────────────────────────────────────────────────
const MOCK_PLAYERS = [
  { id:'1',  name:'Konny',  nickname:'コニー',   mainRole:'TOP',    mainRate:2210, subRate:1989, tags:['常連'], unwantedRoles:[] },
  { id:'2',  name:'Saito',  nickname:'サイトー',  mainRole:'JUNGLE', mainRate:1980, subRate:1782, tags:['常連'], unwantedRoles:[] },
  { id:'3',  name:'Yura',   nickname:'ゆら',     mainRole:'MID',    mainRate:1850, subRate:1665, tags:['常連'], unwantedRoles:['TOP'] },
  { id:'4',  name:'Mochi',  nickname:'もち',     mainRole:'ADC',    mainRate:1700, subRate:1530, tags:['常連'], unwantedRoles:[] },
  { id:'5',  name:'Pyon',   nickname:'ぴょん',   mainRole:'SUP',    mainRate:1470, subRate:1323, tags:['常連'], unwantedRoles:['JUNGLE','MID'] },
  { id:'6',  name:'Riku',   nickname:'リク',     mainRole:'TOP',    mainRate:2150, subRate:1935, tags:['常連'], unwantedRoles:[] },
  { id:'7',  name:'Hiro',   nickname:'ひろ',     mainRole:'JUNGLE', mainRate:2010, subRate:1809, tags:['常連'], unwantedRoles:[] },
  { id:'8',  name:'Kiri',   nickname:'きり',     mainRole:'MID',    mainRate:1820, subRate:1638, tags:['常連'], unwantedRoles:[] },
  { id:'9',  name:'Nao',    nickname:'なお',     mainRole:'ADC',    mainRate:1730, subRate:1557, tags:['一般'], unwantedRoles:['TOP'] },
  { id:'10', name:'Toi',    nickname:'とい',     mainRole:'SUP',    mainRate:1480, subRate:1332, tags:['一般'], unwantedRoles:[] },
  { id:'11', name:'Rin',    nickname:'りん',     mainRole:'MID',    mainRate:1620, subRate:1458, tags:['一般'], unwantedRoles:['SUP'] },
  { id:'12', name:'Kota',   nickname:'こうた',   mainRole:'TOP',    mainRate:1900, subRate:1710, tags:['一般'], unwantedRoles:[] },
  { id:'13', name:'Shu',    nickname:'しゅう',   mainRole:'JUNGLE', mainRate:1750, subRate:1575, tags:['一般'], unwantedRoles:[] },
  { id:'14', name:'Mika',   nickname:'みか',     mainRole:'SUP',    mainRate:1550, subRate:1395, tags:['一般'], unwantedRoles:['JUNGLE'] },
  { id:'15', name:'Yoshi',  nickname:'よし',     mainRole:'ADC',    mainRate:2100, subRate:1890, tags:['一般'], unwantedRoles:[] },
];
const ROLES = ['TOP','JUNGLE','MID','ADC','SUP'];
const RANK_THRESHOLDS = [[3000,'CHALLENGER'],[2700,'GRANDMASTER'],[2500,'MASTER'],[2200,'DIAMOND'],[2000,'EMERALD'],[1900,'PLATINUM'],[1700,'GOLD'],[1500,'SILVER'],[1300,'BRONZE'],[600,'IRON']];
const RANK_COLORS = { UNRANKED:'var(--fg-3)', IRON:'var(--fg-3)', BRONZE:'#cd7f32', SILVER:'#a8a9ad', GOLD:'var(--gold)', PLATINUM:'oklch(0.72 0.15 180)', EMERALD:'oklch(0.74 0.18 155)', DIAMOND:'var(--blue)', MASTER:'var(--r-adc)', GRANDMASTER:'var(--r-top)', CHALLENGER:'var(--gold)' };

function getRank(rate) { for (const [t,r] of RANK_THRESHOLDS) if (rate>=t) return r; return 'UNRANKED'; }
function getRateForRole(player, role) { return role===player.mainRole ? player.mainRate : player.subRate; }
function getAvgRate(team) { if (!team.length) return 0; return Math.round(team.reduce((s,t)=>s+getRateForRole(t.player,t.role),0)/team.length); }
function getTotalRate(team) { return team.reduce((s,t)=>s+getRateForRole(t.player,t.role),0); }
function getRoleDiff(teams, role) {
  const b=teams.blue.find(t=>t.role===role), r=teams.red.find(t=>t.role===role);
  if (!b||!r) return 0;
  return Math.abs(getRateForRole(b.player,b.role)-getRateForRole(r.player,r.role));
}

function buildTeams(selectedPlayers) {
  const sorted=[...selectedPlayers].sort((a,b)=>b.player.mainRate-a.player.mainRate);
  const bluePool=[0,3,4,7,8].map(i=>sorted[i]);
  const redPool=[1,2,5,6,9].map(i=>sorted[i]);
  function assignRoles(pool) {
    const res=pool.map(sp=>({player:sp.player,role:null}));
    const used=new Set(); const done=new Set();
    pool.forEach((sp,i)=>{ const r=sp.player.mainRole; if(!sp.unwantedRoles.includes(r)&&!used.has(r)){res[i].role=r;used.add(r);done.add(i);} });
    const rem=ROLES.filter(r=>!used.has(r));
    pool.forEach((sp,i)=>{ if(done.has(i)) return; const avail=rem.filter(r=>!sp.unwantedRoles.includes(r)); const pick=avail[0]||rem[0]; res[i].role=pick; rem.splice(rem.indexOf(pick),1); });
    return res;
  }
  return { blue:assignRoles(bluePool), red:assignRoles(redPool) };
}

// ── Sub-components ────────────────────────────────────────────────────────
function RoleBadge({ role, className='' }) {
  return <span className={`role-badge ${role} ${className}`}>{role}</span>;
}
function RankDisplay({ rate }) {
  const rank=getRank(rate);
  return <span style={{color:RANK_COLORS[rank],fontFamily:"'JetBrains Mono'",fontSize:'10px'}}>{rank}</span>;
}

function PoolCard({ player, isSelected, isJustAdded, onClick }) {
  return (
    <div className={`pool-card${isSelected?' pool-selected':''}${isJustAdded?' just-added':''}`} onClick={onClick}>
      <RoleBadge role={player.mainRole} />
      <div className="card-info">
        <div className="name">{player.nickname||player.name}</div>
        {player.nickname && <div className="sub-name">{player.name}</div>}
        <div className="rates">
          <span>M <strong style={{color:'var(--fg-1)'}}>{player.mainRate}</strong></span>
          <span style={{color:'var(--line-2)'}}>·</span>
          <span>S <strong style={{color:'var(--fg-1)'}}>{player.subRate}</strong></span>
          <RankDisplay rate={player.mainRate} />
        </div>
      </div>
      {!isSelected && (
        <div className="add-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>
        </div>
      )}
      {isSelected && (
        <div style={{color:'var(--fg-3)'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
      )}
    </div>
  );
}

function RosterSlot({ sp, index, onRemove, onToggleUnwanted }) {
  return (
    <div className="roster-slot">
      <div className="rs-row">
        <span className="roster-num">{String(index+1).padStart(2,'0')}</span>
        <RoleBadge role={sp.player.mainRole} />
        <div className="rs-name-block">
          <div className="rs-pname">{sp.player.nickname||sp.player.name}</div>
          {sp.player.nickname && <div className="rs-sname">{sp.player.name}</div>}
        </div>
        <div className="rs-rates">
          <span>M<strong style={{color:'var(--fg-1)',marginLeft:3}}>{sp.player.mainRate}</strong></span>
          <span>S<strong style={{color:'var(--fg-1)',marginLeft:3}}>{sp.player.subRate}</strong></span>
        </div>
        <div className="rs-ng-row">
          {ROLES.map(role=>(
            <button key={role} className={`uw-btn${sp.unwantedRoles.includes(role)?' uw-on':''}`}
              onClick={()=>onToggleUnwanted(role)} title={`${role}をNGに設定`}>
              {role}
            </button>
          ))}
        </div>
        <button className="remove-btn" onClick={onRemove} title="削除">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
  );
}

function RoleRow({ role, blueTp, redTp, swapSource, onClickBlue, onClickRed, tolerance }) {
  const diff = blueTp && redTp ? Math.abs(getRateForRole(blueTp.player,blueTp.role)-getRateForRole(redTp.player,redTp.role)) : 0;
  const isWarn = diff > tolerance;
  const isSrcBlue = swapSource?.team==='blue' && swapSource?.id===blueTp?.player?.id;
  const isSrcRed  = swapSource?.team==='red'  && swapSource?.id===redTp?.player?.id;
  const isAnySource = swapSource !== null;
  return (
    <div className="role-row">
      {/* Blue player */}
      {blueTp ? (
        <div className={`rr-card blue-card${isSrcBlue?' is-source':isAnySource&&!isSrcBlue?' is-target':''}`} onClick={onClickBlue}>
          <div className="rr-info">
            <div className="rr-line1">
              <span className="rr-name">{blueTp.player.nickname||blueTp.player.name}</span>
              <span className="rr-sub">{blueTp.role===blueTp.player.mainRole?'メイン':'サブ'}</span>
            </div>
            <div className="rr-line2">
              <span className="rr-rate" style={{color:'var(--blue)'}}>{getRateForRole(blueTp.player,blueTp.role)}</span>
              <RankDisplay rate={getRateForRole(blueTp.player,blueTp.role)} />
            </div>
          </div>
          <div className="rr-swap-icon">
            {isSrcBlue
              ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" strokeWidth="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
              : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
            }
          </div>
        </div>
      ) : <div className="rr-card blue-card" style={{opacity:0.3}}><div className="rr-info"><div className="rr-name">—</div></div></div>}

      {/* Center: role + diff */}
      <div className="rr-center">
        <div className={`rr-role-btn ${role}`}>{role}</div>
        <div className={`rr-diff ${isWarn?'warn':'ok'}`}>Δ {diff}</div>
      </div>

      {/* Red player */}
      {redTp ? (
        <div className={`rr-card red-card${isSrcRed?' is-source':isAnySource&&!isSrcRed?' is-target':''}`} onClick={onClickRed}>
          <div className="rr-swap-icon">
            {isSrcRed
              ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" strokeWidth="2"><path d="M19 12H5M11 19l-7-7 7-7"/></svg>
              : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
            }
          </div>
          <div className="rr-info">
            <div className="rr-line1">
              <span className="rr-sub">{redTp.role===redTp.player.mainRole?'メイン':'サブ'}</span>
              <span className="rr-name">{redTp.player.nickname||redTp.player.name}</span>
            </div>
            <div className="rr-line2">
              <RankDisplay rate={getRateForRole(redTp.player,redTp.role)} />
              <span className="rr-rate" style={{color:'var(--red)'}}>{getRateForRole(redTp.player,redTp.role)}</span>
            </div>
          </div>
        </div>
      ) : <div className="rr-card red-card" style={{opacity:0.3}}><div className="rr-info"><div className="rr-name">—</div></div></div>}
    </div>
  );
}

function TeamOverlay({ teams, setTeams, onClose, onRegenerate, matchResult, onMatchResult, tolerance }) {
  const [swapSource, setSwapSource] = useState(null); // {team, id, idx}

  const totalDiff = Math.abs(getTotalRate(teams.blue)-getTotalRate(teams.red));
  const isWarn = totalDiff > tolerance;

  function handleClick(team, idx) {
    const tp = teams[team][idx];
    if (!swapSource) {
      setSwapSource({ team, id: tp.player.id, idx });
    } else if (swapSource.team===team && swapSource.id===tp.player.id) {
      setSwapSource(null);
    } else {
      // Swap
      const nt = { blue:[...teams.blue], red:[...teams.red] };
      const tmp = nt[swapSource.team][swapSource.idx];
      nt[swapSource.team][swapSource.idx] = nt[team][idx];
      nt[team][idx] = tmp;
      setTeams(nt);
      setSwapSource(null);
    }
  }

  function getByRole(team, role) {
    const idx = teams[team].findIndex(t=>t.role===role);
    return { tp: teams[team][idx], idx };
  }

  return (
    <div className="overlay">
      {/* Header */}
      <div className="ov-hd">
        <h2>チーム構成</h2>
        <span style={{fontFamily:"'JetBrains Mono'", fontSize:'11px', color:'var(--fg-3)'}}>クリックして選択 → 別プレイヤーをクリックして交代（同チーム間でロール入れ替えも可）</span>
        <div className="ov-actions">
          <button className="regen-btn" onClick={onRegenerate}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
            再生成
          </button>
          <button className="icon-btn" onClick={onClose} title="閉じる">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>

      {/* Stats bar */}
      <div className="ov-stats" style={{background:`linear-gradient(to right, color-mix(in oklch, var(--blue-bg) 35%, transparent), var(--bg-0) 50%, color-mix(in oklch, var(--red-bg) 35%, transparent))`}}>
        <div className="ov-stat-side">
          <div className="stat-block">
            <div className="sv" style={{color:'var(--blue)'}}>{getAvgRate(teams.blue)}</div>
            <div className="sk">Blue avg rate</div>
          </div>
          <div className="stat-block">
            <div className="sv" style={{color:'var(--fg-2)'}}>{getTotalRate(teams.blue)}</div>
            <div className="sk">Total</div>
          </div>
        </div>
        <div className="ov-stat-mid">
          <div className="total-diff">
            <div className={`td-n ${isWarn?'warn':'ok'}`}>Δ{totalDiff}</div>
            <div className="td-k">total diff</div>
          </div>
        </div>
        <div className="ov-stat-side right">
          <div className="stat-block" style={{alignItems:'flex-end'}}>
            <div className="sv" style={{color:'var(--fg-2)'}}>{getTotalRate(teams.red)}</div>
            <div className="sk">Total</div>
          </div>
          <div className="stat-block" style={{alignItems:'flex-end'}}>
            <div className="sv" style={{color:'var(--red)'}}>{getAvgRate(teams.red)}</div>
            <div className="sk">Red avg rate</div>
          </div>
        </div>
      </div>

      {/* Role rows */}
      <div className="ov-body">
        {swapSource && (
          <div className="swap-banner">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
            <strong>{teams[swapSource.team][swapSource.idx].player.nickname||teams[swapSource.team][swapSource.idx].player.name}</strong>
            を選択中 —
            <span style={{color:'var(--fg-1)',marginLeft:4}}>別チームと交代、または同チーム内でクリックしてロール入れ替え</span>
            <button className="swap-cancel" onClick={()=>setSwapSource(null)}>キャンセル</button>
          </div>
        )}
        {ROLES.map(role => {
          const { tp:bTp, idx:bIdx } = getByRole('blue', role);
          const { tp:rTp, idx:rIdx } = getByRole('red',  role);
          return (
            <RoleRow key={role} role={role}
              blueTp={bTp} redTp={rTp}
              swapSource={swapSource}
              onClickBlue={() => handleClick('blue', bIdx)}
              onClickRed={()  => handleClick('red',  rIdx)}
              tolerance={tolerance} />
          );
        })}
      </div>

      {/* Result bar */}
      <div className="result-bar">
        <span className="res-lbl">結果登録:</span>
        <button className={`win-btn blue ${matchResult==='BLUE'?'won-blue':''}`} onClick={()=>onMatchResult('BLUE')}>
          {matchResult==='BLUE'?'✓ ':''}BLUE WIN
        </button>
        <button className={`win-btn red ${matchResult==='RED'?'won-red':''}`} onClick={()=>onMatchResult('RED')}>
          {matchResult==='RED'?'✓ ':''}RED WIN
        </button>
        <a className="draft-btn" href="https://draftlol.dawe.gg/" target="_blank" rel="noopener noreferrer">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
          Draft Tool
        </a>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [selected, setSelected] = useState([]);
  const [search, setSearch] = useState('');
  const [selectedTags, setSelectedTags] = useState([]);
  const [mode, setMode] = useState('auto');
  const [tolerance, setTolerance] = useState(500);
  const [teams, setTeams] = useState(null);
  const [showOverlay, setShowOverlay] = useState(false);
  const [matchResult, setMatchResult] = useState(null);
  const [justAdded, setJustAdded] = useState(null);

  const availableTags = useMemo(()=>[...new Set(MOCK_PLAYERS.flatMap(p=>p.tags||[]))].sort(),[]);
  const filtered = useMemo(()=>
    MOCK_PLAYERS.filter(p=>{
      const q=search.toLowerCase();
      const mSearch=(p.nickname||'').toLowerCase().includes(q)||p.name.toLowerCase().includes(q);
      const mTags=selectedTags.length===0||selectedTags.some(t=>p.tags?.includes(t));
      return mSearch&&mTags;
    }),[search,selectedTags]);

  const isSelected = id => selected.some(s=>s.player.id===id);

  function addPlayer(player) {
    if (selected.length>=10||isSelected(player.id)) return;
    setSelected(prev=>[...prev,{player,unwantedRoles:[...(player.unwantedRoles||[])]}]);
    setJustAdded(player.id);
    setTimeout(()=>setJustAdded(null),500);
  }
  function removePlayer(idx) { setSelected(prev=>prev.filter((_,i)=>i!==idx)); }
  function toggleUnwanted(idx,role) {
    setSelected(prev=>prev.map((s,i)=>{
      if(i!==idx) return s;
      const has=s.unwantedRoles.includes(role);
      return {...s,unwantedRoles:has?s.unwantedRoles.filter(r=>r!==role):[...s.unwantedRoles,role]};
    }));
  }
  function createTeams() {
    setTeams(buildTeams(selected));
    setMatchResult(null);
    setShowOverlay(true);
  }
  const remain = 10 - selected.length;

  return (
    <>
      <header className="topbar">
        <div className="topbar-inner">
          <a className="brand" href="Top Page.html">
            <span className="brand-mark"></span>
            <span>Team Maker<span className="brand-sub">/ LoL</span></span>
          </a>
          <nav className="nav">
            <a href="Top Page.html">ホーム</a>
            <a href="#">プレイヤー</a>
            <a href="#" className="active">チーム作成</a>
            <a href="#">試合履歴</a>
          </nav>
        </div>
      </header>

      <div className="page-layout">
        {/* Left: Player pool */}
        <div className="panel" data-screen-label="Player Pool">
          <div className="panel-hd">
            <h2>プレイヤー</h2>
            <span className="count">{filtered.length} / {MOCK_PLAYERS.length}</span>
          </div>
          <div className="search-area">
            <div className="search-row">
              <svg className="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <input type="text" placeholder="名前で検索…" value={search} onChange={e=>setSearch(e.target.value)} />
            </div>
            {availableTags.length>0 && (
              <div className="tag-row">
                {availableTags.map(tag=>(
                  <button key={tag} className={`tag-chip${selectedTags.includes(tag)?' active':''}`}
                    onClick={()=>setSelectedTags(prev=>prev.includes(tag)?prev.filter(t=>t!==tag):[...prev,tag])}>
                    {tag}
                  </button>
                ))}
                {selectedTags.length>0&&<button className="tag-chip" onClick={()=>setSelectedTags([])}>✕ 解除</button>}
              </div>
            )}
          </div>
          <div className="panel-body">
            {filtered.map(p=>(
              <PoolCard key={p.id} player={p}
                isSelected={isSelected(p.id)}
                isJustAdded={justAdded===p.id}
                onClick={()=>addPlayer(p)} />
            ))}
            {filtered.length===0&&(
              <div style={{textAlign:'center',color:'var(--fg-3)',fontFamily:"'JetBrains Mono'",fontSize:'12px',padding:'40px 0'}}>
                該当するプレイヤーが見つかりません
              </div>
            )}
          </div>
        </div>

        {/* Right: Selected roster */}
        <div className="panel" style={{borderRight:0}} data-screen-label="Selected Roster">
          <div className="panel-hd">
            <h2>選択中</h2>
            <span className="count" style={{color: remain===0?'var(--ok)':'var(--fg-3)'}}>
              {selected.length} / 10
            </span>
          </div>
          <div className="panel-body">
            {remain>0&&selected.length>0&&(
              <div style={{
                fontFamily:"'JetBrains Mono'",fontSize:'11px',
                color:'var(--fg-3)',letterSpacing:'0.08em',
                padding:'8px 4px 10px',textAlign:'center'
              }}>
                あと <strong style={{color:'var(--fg-1)'}}>{remain}人</strong> 選択してください
              </div>
            )}
            {selected.length===0&&(
              <div style={{textAlign:'center',color:'var(--fg-3)',fontFamily:"'JetBrains Mono'",fontSize:'12px',padding:'40px 16px',lineHeight:1.6,letterSpacing:'0.06em'}}>
                左のリストからプレイヤーを<br/>クリックして選択（最大10人）
              </div>
            )}
            {selected.map((sp,i)=>(
              <RosterSlot key={sp.player.id} sp={sp} index={i}
                onRemove={()=>removePlayer(i)}
                onToggleUnwanted={role=>toggleUnwanted(i,role)} />
            ))}
            {selected.length>0&&Array.from({length:Math.max(0,10-selected.length)},(_,i)=>(
              <div key={i} className="empty-slot">
                {String(selected.length+i+1).padStart(2,'0')} · プレイヤーを選択
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Footer */}
      <div className="action-footer">
        <div className="footer-inner">
          <div className="progress-wrap">
            <div className="prog-dots">
              {Array.from({length:10},(_,i)=>(
                <div key={i} className={`prog-dot${i<selected.length?(i<5?' blue':' red'):''}`}></div>
              ))}
            </div>
            <span className="prog-text">
              <span className="prog-n">{selected.length}/10</span>
              {remain>0&&<span className="prog-remain">— あと{remain}人</span>}
              {remain===0&&<span style={{color:'var(--ok)',marginLeft:6}}>準備完了</span>}
            </span>
          </div>
          <div className="mode-toggle">
            <button className={`mode-btn${mode==='auto'?' active':''}`} onClick={()=>setMode('auto')}>ロール自動</button>
            <button className={`mode-btn${mode==='manual'?' active':''}`} onClick={()=>setMode('manual')}>手動</button>
          </div>
          <div className="tol-wrap">
            <span className="tol-lbl">許容差</span>
            <input className="tol-input" type="number" value={tolerance} min={0} max={1000} step={50} onChange={e=>setTolerance(Number(e.target.value))} />
          </div>
          <div className="spacer"></div>
          {teams&&!showOverlay&&(
            <button className="btn-ghost" onClick={()=>setShowOverlay(true)}>チーム表示</button>
          )}
          <button className="btn-primary" disabled={selected.length<10} onClick={createTeams}>
            {selected.length<10
              ? `チーム作成 (${selected.length}/10)`
              : <>チーム作成 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg></>
            }
          </button>
        </div>
      </div>

      {/* Overlay */}
      {showOverlay&&teams&&(
        <TeamOverlay teams={teams} setTeams={setTeams} tolerance={tolerance}
          matchResult={matchResult} onMatchResult={setMatchResult}
          onClose={()=>setShowOverlay(false)}
          onRegenerate={()=>{ setTeams(buildTeams(selected)); setMatchResult(null); }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
